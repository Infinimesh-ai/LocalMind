query getCopilotPrompts($workspaceId: String) {
  currentUser {
    copilot(workspaceId: $workspaceId) {
      prompts {
        action
        category
        defaultPolicy
        fingerprint
        modelStrategyFingerprint
        model
        modelConfigPath
        modelSource
        name
        optionalModelsConfigPath
        optionalModelCount
        optionalModels
        optionalModelsSource
        overrideApplied
        paramCount
        paramKeys
        proModelsConfigPath
        proModelCount
        proModelsSource
        registryFingerprint
        registryId
        registryMessageCount
        registryModified
        registryUpdatedAt
        registryValidationBlockingCount
        registryValidationDetail
        registryValidationErrorCount
        registryValidationIssueCount
        registryValidationIssues {
          code
          detail
          fieldLabel
          message
          messageIndex
          path
          publishBlocking
          reason
          severity
          source
          sourceLocator {
            field
            messageIndex
            path
            registryFingerprint
            registryId
            registryUpdatedAt
            table
          }
        }
        registryValidationPublishStatus
        registryValidationRemediations {
          detail
          kind
          label
          target
          targetLocator {
            field
            messageIndex
            path
            registryFingerprint
            registryId
            registryUpdatedAt
            table
          }
        }
        registryValidationReason
        registryValidationStatus
        registryRecordSource
        registryRevision
        registryRevisionActorId
        registryRevisionFingerprint
        registryRevisionId
        registryRevisionPublishEventCount
        registryRevisionPublishEvents {
          actorId
          createdAt
          eventFingerprint
          eventType
          id
          metadata
          publishSource
          registryFamily
          registryKey
          registryModelId
          registryProviderId
          revision
          revisionFingerprint
          revisionId
          revisionStatus
          scopeType
          workspaceId
        }
        registryRevisionScope
        registryRevisionStatus
        registryRevisionWorkspaceId
        registrySourceChain {
          actorId
          configPath
          fingerprint
          registryId
          revision
          scope
          source
          status
          updatedAt
          workspaceId
        }
        registrySourceChainFingerprint
        revision
        source
        templateFingerprint
        versionEvidence {
          defaultPolicy
          fingerprint
          modelConfigPath
          modelStrategyFingerprint
          optionalModelsConfigPath
          overrideApplied
          proModelsConfigPath
          registryFingerprint
          registryId
          registryMessageCount
          registryModified
          registryUpdatedAt
          registryValidationBlockingCount
          registryValidationDetail
          registryValidationErrorCount
          registryValidationIssueCount
          registryValidationIssues {
            code
            detail
            fieldLabel
            message
            messageIndex
            path
            publishBlocking
            reason
            severity
            source
            sourceLocator {
              field
              messageIndex
              path
              registryFingerprint
              registryId
            registryUpdatedAt
            table
          }
        }
          registryValidationPublishStatus
          registryValidationRemediations {
            detail
            kind
            label
            target
            targetLocator {
              field
              messageIndex
              path
              registryFingerprint
              registryId
              registryUpdatedAt
              table
            }
          }
          registryValidationReason
          registryValidationStatus
          registryRecordSource
          registryRevision
          registryRevisionActorId
          registryRevisionFingerprint
          registryRevisionId
          registryRevisionPublishEventCount
          registryRevisionPublishEvents {
            actorId
            createdAt
            eventFingerprint
            eventType
            id
            metadata
            publishSource
            registryFamily
            registryKey
            registryModelId
            registryProviderId
            revision
            revisionFingerprint
            revisionId
            revisionStatus
            scopeType
            workspaceId
          }
          registryRevisionScope
          registryRevisionStatus
          registryRevisionWorkspaceId
          registrySourceChain {
            actorId
            configPath
            fingerprint
            registryId
            revision
            scope
            source
            status
            updatedAt
            workspaceId
          }
          registrySourceChainFingerprint
          revision
          templateFingerprint
        }
      }
    }
  }
}
